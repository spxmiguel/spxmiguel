name: Update README

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent repos and contributions, update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 3 most recently pushed public repos (exclude profile repo and forks)
          REPOS=$(gh api "users/spxmiguel/repos?sort=pushed&per_page=10&type=public" \
            --jq '[.[] | select(.name != "spxmiguel" and .fork == false)] | .[0:3]')

          BUILDING=""
          while IFS= read -r repo; do
            NAME=$(echo "$repo" | jq -r '.name')
            DESC=$(echo "$repo" | jq -r '.description // "No description yet"')
            URL=$(echo "$repo" | jq -r '.html_url')
            BUILDING="$BUILDING- [**$NAME**]($URL) — $DESC\n"
          done < <(echo "$REPOS" | jq -c '.[]')

          # 3 most recently updated PRs on external repos (merged or open)
          PRS=$(gh api "search/issues?q=author:spxmiguel+type:pr+-user:spxmiguel&sort=updated&per_page=5" \
            --jq '[.items[] | {title: .title, repo: (.repository_url | split("/") | .[-2:] | join("/")), url: .html_url, state: .state}] | .[0:3]')

          CONTRIBUTING=""
          while IFS= read -r pr; do
            TITLE=$(echo "$pr" | jq -r '.title')
            REPO=$(echo "$pr" | jq -r '.repo')
            URL=$(echo "$pr" | jq -r '.url')
            STATE=$(echo "$pr" | jq -r '.state')
            CONTRIBUTING="$CONTRIBUTING- [**$REPO**]($URL) — $TITLE \`[$STATE]\`\n"
          done < <(echo "$PRS" | jq -c '.[]')

          # Replace both sections
          python3 - <<EOF
          import re

          with open("README.md", "r") as f:
              content = f.read()

          building = """<!--START_SECTION:building-->
${BUILDING}<!--END_SECTION:building-->"""

          contributing = """<!--START_SECTION:contributing-->
${CONTRIBUTING}<!--END_SECTION:contributing-->"""

          content = re.sub(
              r"<!--START_SECTION:building-->.*?<!--END_SECTION:building-->",
              building.strip(),
              content,
              flags=re.DOTALL
          )

          content = re.sub(
              r"<!--START_SECTION:contributing-->.*?<!--END_SECTION:contributing-->",
              contributing.strip(),
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(content)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add README.md && git commit -m "chore: auto-update now section [skip ci]" && git push)
