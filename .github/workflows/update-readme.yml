name: Update README

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch repos and PRs, update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, json, re

          def gh(endpoint):
              result = subprocess.run(
                  ["gh", "api", endpoint],
                  capture_output=True, text=True
              )
              return json.loads(result.stdout)

          # --- Currently Building ---
          repos = gh("users/spxmiguel/repos?sort=pushed&per_page=10&type=public")
          repos = [r for r in repos if r["name"] != "spxmiguel" and not r["fork"]][:3]
          building_lines = "\n".join(
              f'- [**{r["name"]}**]({r["html_url"]}) — {r["description"] or "No description yet"}'
              for r in repos
          )

          # --- Contributing To ---
          search = gh("search/issues?q=author:spxmiguel+type:pr+-user:spxmiguel&sort=updated&per_page=5")
          prs = search.get("items", [])[:3]
          contributing_lines = "\n".join(
              f'- [**{pr["repository_url"].split("/")[-2]}/{pr["repository_url"].split("/")[-1]}**]({pr["html_url"]}) — {pr["title"]} `[{pr["state"]}]`'
              for pr in prs
          ) if prs else "- No external contributions yet"

          # --- Update README ---
          with open("README.md", "r") as f:
              content = f.read()

          content = re.sub(
              r"<!--START_SECTION:building-->.*?<!--END_SECTION:building-->",
              f"<!--START_SECTION:building-->\n{building_lines}\n<!--END_SECTION:building-->",
              content, flags=re.DOTALL
          )
          content = re.sub(
              r"<!--START_SECTION:contributing-->.*?<!--END_SECTION:contributing-->",
              f"<!--START_SECTION:contributing-->\n{contributing_lines}\n<!--END_SECTION:contributing-->",
              content, flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(content)

          print("Done.")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add README.md && git commit -m "chore: auto-update now section [skip ci]" && git push)
