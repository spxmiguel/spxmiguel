name: Update README

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent repos and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get 3 most recently pushed public repos (exclude the profile repo itself)
          REPOS=$(gh api "users/spxmiguel/repos?sort=pushed&per_page=10&type=public" \
            --jq '[.[] | select(.name != "spxmiguel" and .fork == false)] | .[0:3]')

          # Build markdown lines
          LINES=""
          while IFS= read -r repo; do
            NAME=$(echo "$repo" | jq -r '.name')
            DESC=$(echo "$repo" | jq -r '.description // "No description yet"')
            URL=$(echo "$repo" | jq -r '.html_url')
            LINES="$LINES- [**$NAME**]($URL) — $DESC\n"
          done < <(echo "$REPOS" | jq -c '.[]')

          # Replace section between markers
          python3 - <<EOF
          import re

          with open("README.md", "r") as f:
              content = f.read()

          new_section = """<!--START_SECTION:building-->
          ${LINES}<!--END_SECTION:building-->"""

          content = re.sub(
              r"<!--START_SECTION:building-->.*?<!--END_SECTION:building-->",
              new_section.strip(),
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(content)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add README.md && git commit -m "chore: auto-update now section [skip ci]" && git push)
